services:

  mongodb:
    image: mongo:7
    container_name: wifi-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: wifi2024secret
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh -u root -p wifi2024secret --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wifi-redis
    restart: unless-stopped
    command: redis-server --requirepass wifi2024secret
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "wifi2024secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  wifi-portal:
    build: .
    image: wifi-portal:latest
    container_name: wifi-portal
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config.docker.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Shanghai

volumes:
  mongodb_data:
  redis_data:
