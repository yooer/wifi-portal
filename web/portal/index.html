<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xx酒店-无线网络认证接入</title>
    <!-- 引入极富现代质感的谷歌 Outfit 与 Inter 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/portal/style.css">
</head>
<body>
    <!-- 背景流光与微弱极光环绕效果 -->
    <div class="glow-container">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
    </div>

    <div class="portal-wrapper">
        <div class="apple-card">
            <!-- iOS 拟态弹窗控制拉条与顶部栏 -->
            <div class="ios-sheet-grabber"></div>
            <div class="ios-sheet-header">
                <span class="ios-header-cancel">取消</span>
                <span class="ios-header-title">无线局域网</span>
                <span class="ios-header-action disabled" id="nav-connect-text">继续</span>
            </div>

            <!-- 头部：经典苹果极简图标与文字 -->
            <div class="portal-header">
                <div class="brand-avatar">
                    <svg class="apple-wifi-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- 顶部精致五星 -->
                        <path d="M12 2L13.1 4.5H15.8L13.6 6.3L14.4 9L12 7.3L9.6 9L10.4 6.3L8.2 4.5H10.9L12 2Z" fill="currentColor" opacity="0.95"/>
                        <!-- 坡屋顶 -->
                        <path d="M3 10L12 5L21 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        <!-- 檐口横梁 -->
                        <path d="M4 11H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <!-- 4根罗马柱，尊贵庄重 -->
                        <path d="M6 11V18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M10 11V18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M14 11V18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M18 11V18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <!-- 底座地基 -->
                        <path d="M2 19H22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <!-- 拱形大门 -->
                        <path d="M10 19V16C10 14.9 10.9 14 12 14C13.1 14 14 14.9 14 16V19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <h1 id="hotel-name">WiFi 尊享连接</h1>
                <p id="welcome-text">正在初始化安全的无线网关链接...</p>
            </div>

            <!-- 主表单 -->
            <div class="auth-box">
                <!-- iOS 列表分组输入框 -->
                <div class="ios-input-group">
                    <!-- 手机号输入 -->
                    <div class="ios-input-row">
                        <span class="ios-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                        </span>
                        <input type="tel" id="phone" placeholder="手机号码" maxlength="11" inputmode="tel" required autocomplete="off">
                    </div>

                    <div class="ios-input-divider"></div>

                    <!-- 验证码输入与发送按钮 -->
                    <div class="ios-input-row code-wrapper">
                        <span class="ios-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                        </span>
                        <!-- 极其关键的移动端数字键盘唤起属性: inputmode="numeric" pattern="[0-9]*" -->
                        <input type="text" id="code" placeholder="纯数字验证码" maxlength="6" inputmode="numeric" pattern="[0-9]*" required autocomplete="off">
                        <button type="button" id="btn-send-code" class="ios-btn-code">获取验证码</button>
                    </div>
                </div>

                <!-- 苹果风格错误与成功警告框 -->
                <div class="ios-alert error" id="alert-error" style="display: none;">
                    <div class="alert-content">
                        <span class="alert-bullet">!</span>
                        <span id="error-msg">验证失败，请重试</span>
                    </div>
                </div>

                <div class="ios-alert success" id="alert-success" style="display: none;">
                    <div class="alert-content">
                        <span class="alert-bullet">✓</span>
                        <span id="success-msg">验证码已投递</span>
                    </div>
                </div>

                <!-- 放行主按钮 (苹果圆角矩形质感，微弱反光) -->
                <button type="button" id="btn-connect" class="ios-btn-primary">立即尊享高速上网</button>
            </div>

            <!-- 页脚：经典苹果灰色精致版权字体 -->
            <div class="portal-footer">
                <p>安全审计合规上网系统保障中</p>
                <p class="terms">连接即代表您同意《WiFi 接入服务条款》</p>
            </div>
        </div>
    </div>
    
    <script src="/portal/portal.js"></script>
</body>
</html>
